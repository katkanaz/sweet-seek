events { }

http {
    include /etc/nginx/mime.types; 
    server {
      listen 8080;

      location /.well-known/acme-challenge/ {
          root /var/www/certbot;
      }

      location / {
          return 301 https://sweetseek.biodata.ceitec.cz$request_uri;
      }
    }
    server {
      listen 8081 ssl;

      ssl_certificate /etc/letsencrypt/live/sweetseek.biodata.ceitec.cz-0001/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/sweetseek.biodata.ceitec.cz-0001/privkey.pem;
      
      location ^~ /api/ {
        proxy_pass http://backend:3000/;
      
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }
      
      location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
      }
    }


}
